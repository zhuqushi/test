name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container: 
      image: crazymax/buildozer:latest
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python environment
      run: |
        apt-get update
        apt-get install -y python3-pip
        pip3 install --upgrade buildozer cython virtualenv
        
    - name: Create Buildozer spec
      run: |
        buildozer init
        sed -i "s|title = My Application|title = 签到助手|" buildozer.spec
        sed -i "s|package.name = myapp|package.name = signhelper|" buildozer.spec
        sed -i "s|package.domain = org.test|package.domain = com.chaoxing|" buildozer.spec
        sed -i "s|# source.include_exts = py,png,jpg,kv,atlas|source.include_exts = py|" buildozer.spec
        sed -i "s|requirements = |requirements = kivy, requests, pycryptodome|" buildozer.spec
        sed -i "s|# android.permissions = |android.permissions = INTERNET|" buildozer.spec
        echo "android.api = 33" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        
    - name: Create Kivy launcher
      run: |
        cat > main.kv << 'EOF'
<Button>:
    font_size: 24
    background_color: 0.2, 0.6, 1, 1

BoxLayout:
    orientation: 'vertical'
    padding: 20
    spacing: 10
    
    Label:
        id: status_label
        text: '签到助手已就绪'
        font_size: 28
        bold: True
        color: 0, 0, 0, 1
        
    Button:
        text: '执行签到'
        on_press: app.run_sign()
        size_hint_y: None
        height: 60
        
    ScrollView:
        Label:
            id: log_label
            text: ''
            text_size: self.width, None
            size_hint_y: None
            height: self.texture_size[1]
            color: 0.1, 0.1, 0.1, 1
EOF
        
        cat > main.py << 'EOF'
import os
import sys
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.clock import Clock, mainthread
from kivy.core.window import Window

# 添加当前目录到模块搜索路径
sys.path.append(os.path.dirname(os.path.abspath(__file__)))
from 单人签到 import main as sign_main

Window.clearcolor = (0.95, 0.95, 0.95, 1)

class SignApp(App):
    def build(self):
        return BoxLayout()

    def run_sign(self):
        self.root.ids.status_label.text = "正在签到中..."
        self.root.ids.log_label.text = ""
        Clock.schedule_once(lambda dt: self.execute_sign(), 0.1)

    def execute_sign(self):
        import io
        from contextlib import redirect_stdout

        f = io.StringIO()
        with redirect_stdout(f):
            try:
                sign_main()
                self.update_ui("签到完成！", f.getvalue())
            except Exception as e:
                self.update_ui("签到失败", str(e))
    
    @mainthread
    def update_ui(self, status, logs):
        self.root.ids.status_label.text = status
        self.root.ids.log_label.text = logs

if __name__ == '__main__':
    SignApp().run()
EOF
        
    - name: Build APK
      run: |
        buildozer -v android debug
        mv bin/*.apk .
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: sign-helper-apk
        path: ./*.apk
